<div class="page">
  <div class="page-header">
    <div>
      <h2>Boards</h2>
      <p class="muted">Create, rename, and share your whiteboards.</p>
      <p class="muted">Total: {{ boardCount }} | Owned: {{ ownedBoardsCount }} | Server: {{ serverStatus }}</p>
    </div>
    <div class="board-actions">
      <input [(ngModel)]="newBoardTitle" placeholder="Board title" />
      <button
        class="button primary"
        (click)="createBoard()"
        [disabled]="!newBoardTitle.trim()"
      >
        Create Board
      </button>
    </div>
  </div>

  <div class="board-list">
    <app-board-item
      *ngFor="let board of boards"
      [board]="board"
      [currentUserId]="currentUserId"
      (open)="openBoard($event)"
      (share)="promptShare($event)"
      (rename)="renameBoard($event.board, $event.title)"
      (remove)="deleteBoard($event)"
      (disconnect)="disconnectBoard($event)"
    ></app-board-item>
  </div>
</div>
