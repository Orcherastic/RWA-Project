<div class="toolbar" style="margin-bottom: 10px; display: flex; gap: 10px; align-items: center;">
  <div class="tool-group">
    <button
      type="button"
      class="tool-button"
      [class.active]="currentTool === 'brush'"
      (click)="setTool('brush')"
    >
      Brush
    </button>
    <button
      type="button"
      class="tool-button"
      [class.active]="currentTool === 'eraser'"
      (click)="setTool('eraser')"
    >
      Eraser
    </button>
  </div>
  <div class="tool-group">
    <button type="button" class="tool-button" (click)="undo()" [disabled]="!undoStack.length">
      Undo
    </button>
    <button type="button" class="tool-button" (click)="redo()" [disabled]="!redoStack.length">
      Redo
    </button>
  </div>
  <label>
    Color:
    <input type="color" [(ngModel)]="currentColor" />
  </label>

  <label>
    Line width:
    <input type="number" [(ngModel)]="lineWidth" min="1" max="20" />
  </label>

  <button (click)="clearBoard()">
    Clear Board
  </button>
</div>

<div class="board-container" style="position: relative; display: inline-block;">
  <!-- Drawing canvas -->
  <canvas
    #canvas
    width="800"
    height="600"
    style="border: 1px solid black;"
    (mousedown)="onMouseDown($event)"
    (mousemove)="onMouseMove($event)"
    (mouseup)="stopDrawing()"
    (mouseleave)="stopDrawing()"
  ></canvas>

  <!-- Cursor canvas -->
  <canvas
    #cursorCanvas
    width="800"
    height="600"
    style="position: absolute; top: 0; left: 0; pointer-events: none;"
  ></canvas>
</div>
