<div style="margin-bottom: 10px;">
  <label>
    Color:
  <input type="color" [(ngModel)]="currentColor" />
   </label>
  <label>
    Line width:
  <input type="number" [(ngModel)]="lineWidth" min="1" max="10" />
   </label>
</div>

<canvas
  #canvas
  width="800"
  height="600"
  style="border:1px solid black;"
  (mousedown)="onMouseDown($event)"
  (mouseup)="onMouseUp()"
  (mousemove)="onMouseMove($event)">
</canvas>
